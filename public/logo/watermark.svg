<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="200" height="200" fill="none">
  <!-- Outer Aperture Ring -->
  <circle
    cx="32"
    cy="32"
    r="28"
    stroke="#FFFFFF"
    stroke-width="1.5"
    opacity="0.35"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Lens Tick Marks -->
  <line x1="32" y1="4" x2="32" y2="7" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.35" />
  <line x1="32" y1="57" x2="32" y2="60" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.35" />
  <line x1="4" y1="32" x2="7" y2="32" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.35" />
  <line x1="57" y1="32" x2="60" y2="32" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.35" />
  
  <!-- Monogram: Stems & Connections -->
  <!-- R Stem (White) -->
  <line
    x1="22"
    y1="20"
    x2="22"
    y2="44"
    stroke="#FFFFFF"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- R Diagonal Leg (White) -->
  <line
    x1="22"
    y1="32"
    x2="34"
    y2="44"
    stroke="#FFFFFF"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- R Bowl Bottom (White) -->
  <line
    x1="22"
    y1="32"
    x2="42"
    y2="32"
    stroke="#FFFFFF"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- R Bowl Curve (White) -->
  <path
    d="M 22 32 C 22 24.5 27.5 20 32 20"
    stroke="#FFFFFF"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Gold Accent Corner (Gold) -->
  <path
    d="M 32 20 H 42 V 32"
    stroke="#C8A96B"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
